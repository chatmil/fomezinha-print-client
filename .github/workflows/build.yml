name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon.ico from favicon.svg
        run: python generate_icons.py

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "FomezinhaPrint" `
            --icon icon.ico `
            --add-data "icon.ico;." `
            --add-data "icon.png;." `
            --hidden-import pystray._win32 `
            --hidden-import PIL._tkinter_finder `
            --noconfirm `
            --clean `
            fomezinha_print.py

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: FomezinhaPrint-Windows
          path: dist/FomezinhaPrint.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: |
          python3 generate_icons.py
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name "FomezinhaPrint" \
            --icon icon.icns \
            --add-data "icon.png:." \
            --add-data "icon.icns:." \
            --hidden-import pystray._darwin \
            --hidden-import PIL._tkinter_finder \
            --osx-bundle-identifier "com.fomezinha.print" \
            --noconfirm \
            --clean \
            fomezinha_print.py

      - name: Create .dmg
        run: |
          STAGING=$(mktemp -d)
          cp -R dist/FomezinhaPrint.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Fomezinha Print" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            dist/FomezinhaPrint.dmg
          rm -rf "$STAGING"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: FomezinhaPrint-macOS
          path: dist/FomezinhaPrint.dmg
          retention-days: 30
